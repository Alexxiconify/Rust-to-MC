plugins {
    id 'fabric-loom' version '1.15.0-alpha.29'
    id 'maven-publish'
}

version = '1.0.0'
group = 'com.alexxiconify.rustmc'

base {
    archivesName = 'rust-mc'
}

repositories {
    mavenCentral()
    maven { url = "https://maven.terraformersmc.com/" }
    maven { url = "https://maven.isxander.dev/releases" }
    maven { url = "https://maven.fabricmc.net/" }
    maven { url = 'https://jitpack.io' }
    maven { url = "https://maven.bawnorton.com/releases" }
    maven {
        name = "Modrinth"
        url = "https://api.modrinth.com/maven"
    }
}

dependencies {
    minecraft "com.mojang:minecraft:${project.minecraft_version}"
    mappings "net.fabricmc:yarn:${project.yarn_mappings}:v2"
    modImplementation "net.fabricmc:fabric-loader:${project.loader_version}"
    modImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"
    
    // Core dependencies from Oxidizium
    include implementation("org.joml:joml:1.10.8")
    include implementation("com.github.Tater-Certified:MixinConstraints:4856759a06")
    include implementation("com.github.zafarkhaja:java-semver:0.10.2")

    // Config & UI
    modImplementation "dev.isxander:yet-another-config-lib:${project.yacl_version}"
    modImplementation "com.terraformersmc:modmenu:${project.modmenu_version}"
}

processResources {
    inputs.property "version", project.version
    filteringCharset = "UTF-8"

    filesMatching("fabric.mod.json") {
        expand "version": project.version
    }
}

// loom handles sourceSets automatically

tasks.withType(JavaCompile).configureEach {
    it.options.release = 21
}

java {
    withSourcesJar()
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

jar {
    from("LICENSE") {
        rename { "${it}_${project.base.archivesName.get()}" }
    }
}

// - - - - Rust Automation - - - - \\

tasks.register('rustBuild', Exec) {
    workingDir 'rust_mc_core'
    environment 'RUSTFLAGS', '-C target-cpu=native'
    if (org.gradle.internal.os.OperatingSystem.current().isWindows()) {
        commandLine 'cmd', '/c', 'cargo build --release'
    } else {
        commandLine 'cargo', 'build', '--release'
    }
}

tasks.register('moveRustBinaries') {
    dependsOn 'rustBuild'
    doLast {
        def buildDir = file('rust_mc_core/target/release')
        def resourceDir = file('src/main/resources')
        
        def libName = System.mapLibraryName("rust_mc_core")
        def libFile = new File(buildDir, libName)
        
        if (libFile.exists()) {
            copy {
                from libFile
                into resourceDir
            }
            println "Moved ${libName} to resources."
        } else {
            println "Warning: ${libName} not found in ${buildDir}"
        }
    }
}

// Run 'gradlew moveRustBinaries' manually to update the native library in resources.
